name: Build PDF
on: [workflow_dispatch]
jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: latest
          cache: true
          cache_dependency_path: package.json
      - run: pnpm build -- --np
      - run: pnpm exec puppeteer browsers install chrome
      - run: pnpm exec decktape --chrome-arg=--no-sandbox generic --key=Space resulting.html resulting.pdf
      - uses: actions/upload-artifact@v7
        with:
          archive: false
          path: resulting.html
      - uses: actions/upload-artifact@v7
        with:
          archive: false
          path: resulting.pdf