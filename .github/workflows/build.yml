name: Build
on: [push]
jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: latest
          cache: true
          cache_dependency_path: package.json
      - run: pnpm build
      - uses: actions/upload-artifact@v7
        with:
          name: presentation
          path: resulting.html